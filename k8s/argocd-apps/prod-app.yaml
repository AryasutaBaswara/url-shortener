apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: url-shortener-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/aryasutabaswara/url-shortener
    targetRevision: HEAD
    path: k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: url-shortener-prod
  syncPolicy: {}
