name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check app/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run pytest
        env:
          APP_ENV: test
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/urlshortener
          REDIS_URL: redis://localhost:6379/0
          KEYCLOAK_URL: http://localhost:8081
          KEYCLOAK_REALM: url-shortener-realm
          KEYCLOAK_CLIENT_ID: url-shortener-client
        run: pytest tests/test_routes.py tests/test_url_service.py tests/test_shortener.py -v

  integration-test:
    runs-on: ubuntu-latest
    needs: test
    env:
      APP_ENV: test
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/urlshortener
      REDIS_URL: redis://localhost:6379/0
      KEYCLOAK_URL: http://localhost:8081
      KEYCLOAK_REALM: url-shortener-realm
      KEYCLOAK_CLIENT_ID: url-shortener-client
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: urlshortener
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d urlshortener"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Start Keycloak
        run: |
          docker run -d --name ci-keycloak \
            -p 8081:8081 \
            -e KEYCLOAK_ADMIN=admin \
            -e KEYCLOAK_ADMIN_PASSWORD=admin \
            -e KC_HTTP_PORT=8081 \
            quay.io/keycloak/keycloak:24.0.1 start-dev
      - name: Wait for Keycloak to be ready
        run: |
          for attempt in $(seq 1 30); do
            if curl --fail --silent "$KEYCLOAK_URL/realms/master" > /dev/null; then
              exit 0
            fi
            sleep 10
          done
          echo "Keycloak did not become ready in time" >&2
          docker logs ci-keycloak || true
          exit 1
      - name: Configure Keycloak realm
        run: |
          export ADMIN_TOKEN=$(curl --silent --show-error --fail \
            -X POST "$KEYCLOAK_URL/realms/master/protocol/openid-connect/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=password" \
            -d "client_id=admin-cli" \
            -d "username=admin" \
            -d "password=admin" | python -c "import sys, json; print(json.load(sys.stdin)['access_token'])")

          python <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          base_url = f"{os.environ['KEYCLOAK_URL']}/admin/realms"
          token = os.environ["ADMIN_TOKEN"]

          headers = {
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json",
          }

          def request(method, url, payload=None, allowed=(200, 201, 204, 409)):
              data = None if payload is None else json.dumps(payload).encode()
              req = urllib.request.Request(url, data=data, headers=headers, method=method)
              try:
                  with urllib.request.urlopen(req) as response:
                      status = response.status
                      body = response.read().decode()
              except urllib.error.HTTPError as exc:
                  status = exc.code
                  body = exc.read().decode()
              if status not in allowed:
                  raise SystemExit(f"{method} {url} failed with {status}: {body}")
              return status, body

          request(
              "POST",
              base_url,
              {
                  "realm": "url-shortener-realm",
                  "enabled": True,
              },
          )

          request(
              "POST",
              f"{base_url}/url-shortener-realm/clients",
              {
                  "clientId": "url-shortener-client",
                  "enabled": True,
                  "protocol": "openid-connect",
                  "publicClient": False,
                  "secret": "dev-secret",
                  "directAccessGrantsEnabled": True,
                  "standardFlowEnabled": True,
                  "redirectUris": ["http://localhost/*", "http://127.0.0.1/*"],
                  "webOrigins": ["+"],
              },
          )

          request(
              "POST",
              f"{base_url}/url-shortener-realm/users",
              {
                  "username": "testuser",
                  "enabled": True,
                  "emailVerified": True,
                  "credentials": [
                      {
                          "type": "password",
                          "value": "testpassword",
                          "temporary": False,
                      }
                  ],
              },
          )
          PY
      - name: Run integration and auth tests
        run: pytest tests/test_integration.py tests/test_auth.py -v
      - name: Show Keycloak logs on failure
        if: failure()
        run: docker logs ci-keycloak
      - name: Stop Keycloak
        if: always()
        run: docker rm -f ci-keycloak

  build:
    runs-on: ubuntu-latest
    needs: integration-test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Docker image
        run: |
          docker build -t ghcr.io/aryasutabaswara/url-shortener:latest -t ghcr.io/aryasutabaswara/url-shortener:${{ github.sha }} -f docker/Dockerfile .
      - name: Push Docker image
        run: |
          docker push ghcr.io/aryasutabaswara/url-shortener:latest
          docker push ghcr.io/aryasutabaswara/url-shortener:${{ github.sha }}
