name: CD

on:
  workflow_dispatch:

jobs:
  deploy-staging:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          cat <<'EOF' > "$HOME/.kube/config"
          ${{ secrets.KUBE_CONFIG }}
          EOF
          chmod 600 "$HOME/.kube/config"

      - name: Inject staging secrets
        run: |
          kubectl create namespace url-shortener-staging --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic url-shortener-secret \
            --from-literal=DATABASE_URL='${{ secrets.STAGING_DATABASE_URL }}' \
            --from-literal=POSTGRES_USER='${{ secrets.STAGING_POSTGRES_USER }}' \
            --from-literal=POSTGRES_PASSWORD='${{ secrets.STAGING_POSTGRES_PASSWORD }}' \
            --from-literal=POSTGRES_DB='${{ secrets.STAGING_POSTGRES_DB }}' \
            --from-literal=KEYCLOAK_ADMIN='${{ secrets.STAGING_KEYCLOAK_ADMIN }}' \
            --from-literal=KEYCLOAK_ADMIN_PASSWORD='${{ secrets.STAGING_KEYCLOAK_ADMIN_PASSWORD }}' \
            --from-literal=KEYCLOAK_CLIENT_SECRET='${{ secrets.STAGING_KEYCLOAK_CLIENT_SECRET }}' \
            -n url-shortener-staging \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Wait for staging rollout
        run: |
          kubectl rollout status deployment/url-shortener -n url-shortener-staging --timeout=10m

      - name: Run staging smoke test
        run: |
          curl --fail --show-error '${{ secrets.STAGING_URL }}/health'

  load-test:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Locust
        run: |
          python -m pip install --upgrade pip
          pip install locust requests

      - name: Run load test
        env:
          LOCUST_HOST: ${{ secrets.STAGING_URL }}
          KEYCLOAK_TOKEN_URL: ${{ secrets.STAGING_KEYCLOAK_TOKEN_URL }}
          KEYCLOAK_CLIENT_ID: url-shortener-client
          KEYCLOAK_CLIENT_SECRET: ${{ secrets.STAGING_KEYCLOAK_CLIENT_SECRET }}
          KEYCLOAK_USERNAME: ${{ secrets.STAGING_KEYCLOAK_USERNAME }}
          KEYCLOAK_PASSWORD: ${{ secrets.STAGING_KEYCLOAK_PASSWORD }}
        run: |
          locust -f tests/locustfile.py --headless --users 10 --spawn-rate 2 --run-time 60s

  deploy-prod:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    needs: load-test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          cat <<'EOF' > "$HOME/.kube/config"
          ${{ secrets.KUBE_CONFIG }}
          EOF
          chmod 600 "$HOME/.kube/config"

      - name: Inject prod secrets
        run: |
          kubectl create namespace url-shortener-prod --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic url-shortener-secret \
            --from-literal=DATABASE_URL='${{ secrets.PROD_DATABASE_URL }}' \
            --from-literal=POSTGRES_USER='${{ secrets.PROD_POSTGRES_USER }}' \
            --from-literal=POSTGRES_PASSWORD='${{ secrets.PROD_POSTGRES_PASSWORD }}' \
            --from-literal=POSTGRES_DB='${{ secrets.PROD_POSTGRES_DB }}' \
            --from-literal=KEYCLOAK_ADMIN='${{ secrets.PROD_KEYCLOAK_ADMIN }}' \
            --from-literal=KEYCLOAK_ADMIN_PASSWORD='${{ secrets.PROD_KEYCLOAK_ADMIN_PASSWORD }}' \
            --from-literal=KEYCLOAK_CLIENT_SECRET='${{ secrets.PROD_KEYCLOAK_CLIENT_SECRET }}' \
            -n url-shortener-prod \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Trigger ArgoCD prod refresh
        run: |
          kubectl annotate app url-shortener-prod -n argocd argocd.argoproj.io/refresh=hard --overwrite
