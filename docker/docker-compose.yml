version: "3.9"

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: url-shortener-app
    env_file:
      - ../environments/dev/.env.dev
    ports:
      - "8000:8000"
    depends_on:
      - supabase-db
      - redis
      - keycloak
    networks:
      - urlshortener-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 20s
      timeout: 5s
      retries: 5

  supabase-db:
    image: postgres:15-alpine
    container_name: supabase-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: urlshortener
    ports:
      - "5433:5432"
    networks:
      - urlshortener-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 20s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: urlshortener-redis
    ports:
      - "6379:6379"
    networks:
      - urlshortener-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 20s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: urlshortener-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL_HOST: supabase-db
      KC_DB_URL_DATABASE: urlshortener
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
      KC_HTTP_PORT: 8081
      KC_HOSTNAME: localhost
    ports:
      - "8081:8081"
    volumes:
      - ../environments/dev/keycloak-realm-dev.json:/opt/keycloak/data/import/realm.json:ro
    depends_on:
      - supabase-db
    networks:
      - urlshortener-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081"]
      interval: 20s
      timeout: 5s
      retries: 5

networks:
  urlshortener-net:
    driver: bridge
